<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adulting - Hackea el filtro de IA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #F8FAFC;
            color: #1E293B;
            overflow-x: hidden;
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }

        .meme-card {
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            border: 2px solid #C7D2FE;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
        
        .preview-scroll::-webkit-scrollbar { width: 6px; }
        .preview-scroll::-webkit-scrollbar-track { background: transparent; }
        .preview-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="bg-pattern">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuración Global ---
        let db, auth, appId;
        const apiKey = ""; 

        try {
            const configRaw = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configRaw) {
                const firebaseConfig = JSON.parse(configRaw);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'adulting-prod';
            }
        } catch (e) { console.warn("Modo Offline: Firebase no detectado."); }

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [step, setStep] = useState(0); 
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [jobUrl, setJobUrl] = useState("");
            const [linkedinUrl, setLinkedinUrl] = useState("");
            const [result, setResult] = useState({ optimized_cv: "", strategy: "" });
            const [history, setHistory] = useState([]);

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error(err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'analyses');
                const unsubscribe = onSnapshot(query(historyRef), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setHistory(data.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)));
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, loading, error, history]);

            const callAi = async () => {
                if (!linkedinUrl.toLowerCase().includes("linkedin.com/")) {
                    setError("Por favor, introduce una URL de LinkedIn válida.");
                    return;
                }

                setLoading(true);
                setError(null);
                
                const prompt = `Analiza la vacante en este enlace: "${jobUrl}" y el perfil de LinkedIn: "${linkedinUrl}". Genera un CV optimizado y profesional que pase los filtros ATS basándote en la información pública del perfil. Sé sutil y no copies frases literales de la vacante. Responde exclusivamente en JSON: {"optimized_cv": "...", "strategy": "..."}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "google_search": {} }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    const output = JSON.parse(data.candidates[0].content.parts[0].text);
                    setResult(output);

                    if (user && db) {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'analyses'), {
                            jobUrl, linkedinUrl, optimized_cv: output.optimized_cv, strategy: output.strategy, timestamp: Date.now()
                        });
                    }
                    setStep(3);
                } catch (err) {
                    setError("LinkedIn bloqueó el análisis automático o el perfil no es accesible. Asegúrate de que tu perfil sea público.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="w-full min-h-screen flex flex-col items-center py-8 md:py-16 px-4">
                    <div className="w-full max-w-4xl">
                        
                        {/* PASO 0: MANIFIESTO */}
                        {step === 0 && (
                            <div className="animate-slide text-center space-y-10 py-4">
                                <div className="max-w-lg mx-auto meme-card rounded-[2.5rem] p-6 shadow-xl relative mb-12 transform -rotate-1">
                                    <div className="absolute -top-4 -right-4 bg-yellow-400 text-black font-black px-4 py-1 rounded-full text-[10px] shadow-lg uppercase tracking-tight">Realidad</div>
                                    <div className="grid grid-cols-2 gap-4 text-left">
                                        <div className="bg-white rounded-2xl p-4 shadow-sm">
                                            <span className="text-4xl">🧑‍💻</span>
                                            <p className="text-[10px] font-bold text-slate-400 mt-2 uppercase">Yo:</p>
                                            <p className="text-[11px] font-black leading-tight text-slate-800">"Tengo experiencia real..."</p>
                                        </div>
                                        <div className="bg-white rounded-2xl p-4 shadow-sm border-2 border-red-100">
                                            <span className="text-4xl">🤖</span>
                                            <p className="text-[10px] font-bold text-slate-400 mt-2 uppercase">El Filtro IA:</p>
                                            <p className="text-[11px] font-black leading-tight text-red-600 italic">"No usó la keyword exacta. DESCARTADO."</p>
                                        </div>
                                    </div>
                                    <p className="mt-4 text-[10px] text-indigo-400 font-bold italic text-center">POV: El algoritmo ignorando tu talento por una palabra clave.</p>
                                </div>

                                <div className="space-y-6">
                                    <h1 className="text-5xl md:text-7xl font-[900] text-slate-900 tracking-tighter leading-none">
                                        No más <span className="text-indigo-600">ghosting.</span>
                                    </h1>
                                    <div className="max-w-2xl mx-auto px-4 space-y-4">
                                        <p className="text-lg md:text-xl text-slate-600 font-bold">¿Qué es Adulting?</p>
                                        <p className="text-base md:text-lg text-slate-500 leading-relaxed font-medium">
                                            Es un <b>copiloto inteligente</b> diseñado para ayudarte a modificar tu CV y vencer los filtros de IA (ATS) analizando directamente tu perfil de LinkedIn.
                                        </p>
                                    </div>
                                </div>

                                <button onClick={() => setStep(1)} className="group relative px-10 py-5 bg-slate-900 text-white rounded-2xl font-black text-lg transition-all hover:bg-indigo-600 hover:scale-105 active:scale-95 shadow-2xl shadow-indigo-200 flex items-center gap-3 mx-auto">
                                    Optimizar mi futuro <i data-lucide="arrow-right" className="group-hover:translate-x-1 transition-transform"></i>
                                </button>
                                
                                {history.length > 0 && (
                                    <div className="mt-12 text-left bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                        <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Historial</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {history.slice(0, 4).map((item) => (
                                                <div key={item.id} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-between cursor-pointer hover:bg-indigo-50 transition-colors" onClick={() => {setResult(item); setStep(3);}}>
                                                    <div className="flex items-center gap-3 truncate">
                                                        <i data-lucide="link-2" className="text-slate-400 w-4 h-4"></i>
                                                        <span className="text-xs font-bold text-slate-600 truncate">Análisis Guardado</span>
                                                    </div>
                                                    <i data-lucide="chevron-right" className="text-slate-300 w-4 h-4"></i>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {step > 0 && (
                            <div className="animate-slide">
                                <header className="flex items-center justify-between mb-8 px-2">
                                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setStep(0)}>
                                        <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white"><i data-lucide="zap" className="w-4 h-4"></i></div>
                                        <span className="font-black text-xl tracking-tight">adulting.</span>
                                    </div>
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-white px-4 py-1.5 rounded-full border border-slate-100">Bypass ATS v2.5</div>
                                </header>

                                <div className="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl">
                                    <div className="flex border-b border-slate-50">
                                        {[1, 2, 3].map(s => (
                                            <div key={s} className={`flex-1 py-4 text-center text-[10px] font-black uppercase tracking-widest transition-all ${step === s ? 'text-indigo-600 border-b-2 border-indigo-600 bg-white' : 'text-slate-300'}`}>0{s}</div>
                                        ))}
                                    </div>

                                    <div className="p-8 md:p-14">
                                        {/* PASO 1: ENLACE VACANTE */}
                                        {step === 1 && (
                                            <div className="space-y-8 text-left">
                                                <div className="space-y-2">
                                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none text-left">La Vacante</h2>
                                                    <p className="text-sm text-slate-400 font-medium tracking-tight text-left">Pega el enlace de la oferta de trabajo.</p>
                                                </div>
                                                <input type="url" className="w-full py-6 px-8 rounded-3xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all text-sm font-medium" placeholder="Enlace de LinkedIn, Indeed, etc..." value={jobUrl} onChange={(e) => setJobUrl(e.target.value)} />
                                                <button onClick={() => setStep(2)} disabled={!jobUrl} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black hover:bg-indigo-600 disabled:opacity-30 transition-all text-lg shadow-xl">Siguiente Paso <i data-lucide="chevron-right" className="inline ml-1"></i></button>
                                            </div>
                                        )}

                                        {/* PASO 2: ENLACE LINKEDIN */}
                                        {step === 2 && (
                                            <div className="space-y-8 text-left">
                                                <div className="space-y-2">
                                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none text-left">Tu LinkedIn</h2>
                                                    <p className="text-sm text-slate-400 font-medium tracking-tight text-left">Necesitamos tu perfil para extraer tu experiencia.</p>
                                                </div>
                                                
                                                <input type="url" className="w-full py-6 px-8 rounded-3xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all text-sm font-medium" placeholder="https://www.linkedin.com/in/tu-perfil/" value={linkedinUrl} onChange={(e) => setLinkedinUrl(e.target.value)} />

                                                {error && <div className="p-4 bg-red-50 text-red-600 rounded-xl border border-red-100 text-[11px] font-bold flex gap-3 animate-slide"><i data-lucide="alert-circle" className="w-4 h-4 flex-shrink-0"></i> {error}</div>}
                                                
                                                <div className="flex gap-4">
                                                    <button onClick={() => setStep(1)} className="flex-1 py-4 text-slate-400 font-bold hover:text-slate-600 uppercase text-xs tracking-widest transition-all">Volver</button>
                                                    <button onClick={callAi} disabled={loading || !linkedinUrl} className="flex-[2] py-5 bg-indigo-600 text-white rounded-2xl font-black hover:bg-slate-900 transition-all text-lg shadow-xl">
                                                        {loading ? <div className="flex items-center justify-center gap-2"><div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Analizando...</div> : "Optimizar CV"}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {/* PASO 3: RESULTADOS */}
                                        {step === 3 && (
                                            <div className="space-y-8 animate-slide text-left">
                                                <div className="flex justify-between items-center gap-4">
                                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none text-left">CV Optimizado</h2>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {
                                                            const el = document.createElement('textarea'); el.value = result.optimized_cv;
                                                            document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                                        }} className="p-4 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-600"><i data-lucide="copy" className="w-5 h-5"></i></button>
                                                        <button onClick={() => {
                                                            const el = document.createElement("a"); el.href = URL.createObjectURL(new Blob([result.optimized_cv], {type: 'text/plain'}));
                                                            el.download = "CV_Adulting.txt"; el.click();
                                                        }} className="px-6 py-4 bg-slate-900 text-white rounded-xl font-black flex items-center gap-2 hover:bg-indigo-600 shadow-lg shadow-indigo-100"><i data-lucide="download" className="w-4 h-4"></i> Descargar</button>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left">
                                                    <div className="lg:col-span-2 bg-slate-900 rounded-[2rem] p-8 text-slate-300 font-mono text-xs h-[500px] overflow-y-auto leading-loose whitespace-pre-wrap border border-slate-800 preview-scroll shadow-inner">
                                                        {result.optimized_cv}
                                                    </div>
                                                    <div className="space-y-6">
                                                        <div className="p-6 bg-indigo-50 border border-indigo-100 rounded-[2rem] shadow-sm text-left"><h4 className="text-[10px] font-black text-indigo-800 uppercase tracking-widest mb-3 flex items-center gap-2 leading-none text-left"><i data-lucide="cpu" className="w-3 h-3"></i> Estrategia</h4><p className="text-xs text-indigo-700 leading-relaxed font-semibold italic text-left">"{result.strategy}"</p></div>
                                                        <button onClick={() => {setStep(0); setLinkedinUrl("");}} className="w-full py-4 text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-indigo-600 transition-colors">Nuevo Análisis</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <footer className="mt-12 text-slate-300 text-[10px] font-black uppercase tracking-[0.3em] pb-12">Adulting • IA Analytics • 2024</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
