<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adulting - Hackea el filtro de IA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #F8FAFC;
            color: #1E293B;
            overflow-x: hidden;
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }

        .meme-card {
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            border: 2px solid #C7D2FE;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
        
        .preview-scroll::-webkit-scrollbar { width: 6px; }
        .preview-scroll::-webkit-scrollbar-track { background: transparent; }
        .preview-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="bg-pattern">
    <div id="root"></div>

    <!-- Firebase SDKs y lógica de la aplicación -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuración Global ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const apiKey = ""; 

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [step, setStep] = useState(0); 
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [jobUrl, setJobUrl] = useState("");
            const [linkedinUrl, setLinkedinUrl] = useState("");
            const [result, setResult] = useState({ optimized_cv: "", strategy: "" });
            const [history, setHistory] = useState([]);

            // Autenticación (Regla 3 de almacenamiento)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Error de autenticación:", err);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Historial (Reglas 1 y 2 de almacenamiento)
            useEffect(() => {
                if (!user) return;
                // Ruta estricta según Regla 1
                const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'analyses');
                const unsubscribe = onSnapshot(query(historyRef), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setHistory(data);
                }, (err) => {
                    console.error("Error en Firestore:", err);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, loading, error, history]);

            const callAi = async () => {
                if (!linkedinUrl.toLowerCase().includes("linkedin.com/")) {
                    setError("Por favor, introduce una URL de LinkedIn válida.");
                    return;
                }
                if (!jobUrl.trim()) {
                    setError("Por favor, introduce el enlace de la vacante.");
                    return;
                }

                setLoading(true);
                setError(null);
                
                const prompt = `
                    Eres un experto en reclutamiento. Tu misión es generar un CV optimizado para una vacante específica.
                    
                    DATOS:
                    1. Enlace de la vacante: "${jobUrl}"
                    2. Enlace de LinkedIn del usuario: "${linkedinUrl}"
                    
                    INSTRUCCIONES:
                    - Usa tu herramienta de búsqueda para analizar el contenido de ambos enlaces.
                    - Genera un CV profesional (formato texto) que resalte las habilidades que busca la vacante de forma SUTIL.
                    - No copies la vacante literalmente; adapta la experiencia de LinkedIn al lenguaje que el ATS prioriza.
                    
                    Responde en JSON: {"optimized_cv": "...", "strategy": "..."}
                `;

                try {
                    // Implementación de backoff exponencial para llamadas a la API
                    const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                        try {
                            const res = await fetch(url, options);
                            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                            return res;
                        } catch (err) {
                            if (retries > 0) {
                                await new Promise(resolve => setTimeout(resolve, backoff));
                                return fetchWithRetry(url, options, retries - 1, backoff * 2);
                            }
                            throw err;
                        }
                    };

                    const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "google_search": {} }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        optimized_cv: { type: "STRING" },
                                        strategy: { type: "STRING" }
                                    }
                                }
                            }
                        })
                    });

                    const data = await response.json();
                    const textContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!textContent) throw new Error("La IA no devolvió contenido.");
                    
                    const output = JSON.parse(textContent);
                    setResult(output);

                    // Guardado seguro en Firestore tras autenticación
                    if (user) {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'analyses'), {
                            jobUrl,
                            linkedinUrl,
                            optimized_cv: output.optimized_cv,
                            strategy: output.strategy,
                            timestamp: Date.now()
                        });
                    }
                    
                    setStep(3);
                } catch (err) {
                    console.error("Error en el análisis:", err);
                    setError("No pudimos procesar los enlaces. Asegúrate de que sean públicos e intenta de nuevo.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="w-full min-h-screen flex flex-col items-center py-8 md:py-16 px-4">
                    <div className="w-full max-w-4xl">
                        
                        {/* PASO 0: MANIFIESTO */}
                        {step === 0 && (
                            <div className="animate-slide text-center space-y-10 py-4">
                                <div className="max-w-lg mx-auto meme-card rounded-[2.5rem] p-6 shadow-xl relative mb-12 transform -rotate-1">
                                    <div className="absolute -top-4 -right-4 bg-yellow-400 text-black font-black px-4 py-1 rounded-full text-[10px] shadow-lg uppercase tracking-tight">Realidad</div>
                                    <div className="grid grid-cols-2 gap-4 text-left">
                                        <div className="bg-white rounded-2xl p-4 shadow-sm">
                                            <span className="text-4xl">🧑‍💻</span>
                                            <p className="text-[10px] font-bold text-slate-400 mt-2 uppercase">Yo:</p>
                                            <p className="text-[11px] font-black leading-tight text-slate-800">"Tengo 5 años de experiencia y hablo 3 idiomas."</p>
                                        </div>
                                        <div className="bg-white rounded-2xl p-4 shadow-sm border-2 border-red-100">
                                            <span className="text-4xl">🤖</span>
                                            <p className="text-[10px] font-bold text-slate-400 mt-2 uppercase">El Bot:</p>
                                            <p className="text-[11px] font-black leading-tight text-red-600">"Error: No encontré la palabra clave 'Ninja'. Descartado."</p>
                                        </div>
                                    </div>
                                    <p className="mt-4 text-[10px] text-indigo-400 font-bold italic">POV: El ATS ignorando tu talento por falta de una keyword.</p>
                                </div>

                                <div className="inline-block p-4 bg-indigo-600 rounded-3xl text-white shadow-2xl rotate-3 mb-4">
                                    <i data-lucide="zap" className="w-8 h-8 md:w-10 md:h-10"></i>
                                </div>

                                <div className="space-y-6">
                                    <h1 className="text-4xl md:text-7xl font-[900] text-slate-900 tracking-tighter leading-none">
                                        No más <span className="text-indigo-600">ghosting</span> corporativo.
                                    </h1>
                                    <div className="max-w-2xl mx-auto px-4 space-y-4">
                                        <p className="text-lg md:text-xl text-slate-600 font-bold">¿Qué es Adulting?</p>
                                        <p className="text-base md:text-lg text-slate-500 leading-relaxed font-medium">
                                            Es un <b>copiloto inteligente</b> diseñado para ayudarte a modificar tu CV y vencer los filtros de IA (ATS). Simplemente pega el enlace de la vacante y tu perfil de LinkedIn, y nosotros hacemos la magia.
                                        </p>
                                    </div>
                                </div>

                                <button onClick={() => setStep(1)} className="group relative px-10 py-5 bg-slate-900 text-white rounded-2xl font-black text-lg transition-all hover:bg-indigo-600 hover:scale-105 active:scale-95 shadow-2xl shadow-indigo-200 flex items-center gap-3 mx-auto">
                                    Optimizar mi futuro <i data-lucide="arrow-right" className="group-hover:translate-x-1 transition-transform"></i>
                                </button>
                                
                                {history.length > 0 && (
                                    <div className="mt-12 text-left bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                        <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Historial</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {history.slice(0, 4).sort((a,b) => b.timestamp - a.timestamp).map((item) => (
                                                <div key={item.id} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-between cursor-pointer hover:bg-indigo-50 transition-colors" onClick={() => {setResult(item); setStep(3);}}>
                                                    <div className="flex items-center gap-3 truncate">
                                                        <i data-lucide="link-2" className="text-slate-400 w-4 h-4"></i>
                                                        <span className="text-xs font-bold text-slate-600 truncate">Análisis Guardado</span>
                                                    </div>
                                                    <i data-lucide="chevron-right" className="text-slate-300 w-4 h-4"></i>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {step > 0 && (
                            <div className="animate-slide">
                                <header className="flex items-center justify-between mb-8 px-2">
                                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setStep(0)}>
                                        <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white shadow-lg"><i data-lucide="zap" className="w-4 h-4"></i></div>
                                        <span className="font-black text-xl tracking-tight">adulting.</span>
                                    </div>
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] bg-white px-4 py-1.5 rounded-full border border-slate-100 shadow-sm">Smart Analytics</div>
                                </header>

                                <div className="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl shadow-indigo-100/30">
                                    <div className="flex border-b border-slate-100 bg-slate-50/50">
                                        {[1, 2, 3].map(s => (
                                            <div key={s} className={`flex-1 py-4 text-center text-[10px] font-black uppercase tracking-widest transition-all ${step === s ? 'text-indigo-600 border-b-2 border-indigo-600 bg-white' : 'text-slate-300'}`}>0{s}</div>
                                        ))}
                                    </div>

                                    <div className="p-6 md:p-14">
                                        {/* STEP 1: JOB URL */}
                                        {step === 1 && (
                                            <div className="space-y-8 text-left">
                                                <div className="space-y-2">
                                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">La Vacante</h2>
                                                    <p className="text-sm text-slate-400 font-medium">Pega el enlace de la oferta de trabajo (LinkedIn, Indeed, etc.).</p>
                                                </div>
                                                <div className="relative">
                                                    <div className="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none text-slate-400">
                                                        <i data-lucide="link" className="w-5 h-5"></i>
                                                    </div>
                                                    <input 
                                                        type="url"
                                                        className="w-full py-6 pl-14 pr-6 rounded-3xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 outline-none transition-all text-slate-700 text-sm font-medium shadow-inner"
                                                        placeholder="https://www.linkedin.com/jobs/view/..."
                                                        value={jobUrl}
                                                        onChange={(e) => setJobUrl(e.target.value)}
                                                    />
                                                </div>
                                                <button onClick={() => setStep(2)} disabled={!jobUrl} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-indigo-600 disabled:opacity-30 transition-all text-lg shadow-xl">Siguiente Paso <i data-lucide="chevron-right"></i></button>
                                            </div>
                                        )}

                                        {/* STEP 2: LINKEDIN URL */}
                                        {step === 2 && (
                                            <div className="space-y-8 text-left">
                                                <div className="space-y-2">
                                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">Tu Perfil</h2>
                                                    <p className="text-sm text-slate-400 font-medium">Pega el enlace a tu LinkedIn para extraer tu experiencia.</p>
                                                </div>
                                                <div className="relative">
                                                    <div className="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none text-slate-400">
                                                        <i data-lucide="linkedin" className="w-5 h-5"></i>
                                                    </div>
                                                    <input 
                                                        type="url"
                                                        className="w-full py-6 pl-14 pr-6 rounded-3xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 outline-none transition-all text-slate-700 text-sm font-medium shadow-inner"
                                                        placeholder="https://www.linkedin.com/in/tu-perfil/"
                                                        value={linkedinUrl}
                                                        onChange={(e) => setLinkedinUrl(e.target.value)}
                                                    />
                                                </div>
                                                {error && <p className="text-red-500 text-[11px] font-black bg-red-50 p-4 rounded-2xl border border-red-100 flex items-center gap-2"><i data-lucide="alert-circle" className="w-4 h-4"></i> {error}</p>}
                                                <div className="flex flex-col md:flex-row gap-4 pt-4">
                                                    <button onClick={() => setStep(1)} className="order-2 md:order-1 flex-1 py-4 text-slate-400 font-bold hover:text-slate-600 transition-colors uppercase text-xs tracking-widest">Volver</button>
                                                    <button onClick={callAi} disabled={loading || !linkedinUrl} className="order-1 md:order-2 flex-[2] py-5 bg-indigo-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-900 shadow-xl shadow-indigo-100 transition-all text-lg">
                                                        {loading ? <><div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Procesando enlaces...</> : <><i data-lucide="sparkles"></i> Optimizar CV</>}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {/* STEP 3: RESULTS */}
                                        {step === 3 && (
                                            <div className="space-y-8 animate-slide text-left">
                                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center border border-green-100 shadow-sm"><i data-lucide="shield-check" className="w-6 h-6"></i></div>
                                                        <div><h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">Optimizado</h2><p className="text-xs text-slate-400 font-bold uppercase mt-1 tracking-tighter">Resultado listo</p></div>
                                                    </div>
                                                    <div className="flex gap-2 w-full md:w-auto">
                                                        <button onClick={() => {
                                                            const copyText = result.optimized_cv;
                                                            const el = document.createElement('textarea');
                                                            el.value = copyText;
                                                            document.body.appendChild(el);
                                                            el.select();
                                                            document.execCommand('copy');
                                                            document.body.removeChild(el);
                                                        }} className="flex-1 md:flex-none p-5 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-all text-slate-600 shadow-sm"><i data-lucide="copy"></i></button>
                                                        <button onClick={() => { const el = document.createElement("a"); el.href = URL.createObjectURL(new Blob([result.optimized_cv], {type: 'text/plain'})); el.download = "CV_Optimizado_Adulting.txt"; el.click(); }} className="flex-[3] md:flex-none py-4 px-8 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl hover:bg-indigo-600 transition-all shadow-indigo-100"><i data-lucide="download"></i> Descargar</button>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                                    <div className="lg:col-span-2 bg-slate-900 rounded-[2rem] p-6 md:p-10 text-slate-300 font-mono text-[11px] md:text-[13px] h-80 md:h-[550px] overflow-y-auto leading-loose border border-slate-800 preview-scroll shadow-inner relative whitespace-pre-wrap">
                                                        {result.optimized_cv}
                                                    </div>
                                                    <div className="space-y-6">
                                                        <div className="p-6 bg-indigo-50 border border-indigo-100 rounded-[2rem] shadow-sm"><h4 className="text-[10px] font-black text-indigo-800 uppercase tracking-widest mb-3 flex items-center gap-2 leading-none"><i data-lucide="cpu" className="w-3 h-3"></i> Estrategia</h4><p className="text-xs text-indigo-700 leading-relaxed font-semibold italic">{result.strategy}</p></div>
                                                        <button onClick={() => setStep(0)} className="w-full py-4 text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-indigo-600 transition-colors">Volver al inicio</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <footer className="max-w-4xl mx-auto mt-12 text-center text-slate-300 text-[10px] font-black uppercase tracking-[0.3em] px-4 pb-12">Adulting • IA Analytics • 2024</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
