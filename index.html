<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adulting - Hackea el filtro de IA</title>
    <!-- Frameworks y Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #F8FAFC;
            color: #1E293B;
            overflow-x: hidden;
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }

        .meme-card {
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            border: 2px solid #C7D2FE;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
        
        .preview-scroll::-webkit-scrollbar { width: 6px; }
        .preview-scroll::-webkit-scrollbar-track { background: transparent; }
        .preview-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="bg-pattern">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const apiKey = ""; // API Key gestionada por el entorno

        function App() {
            const [step, setStep] = useState(0); 
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [jobDescription, setJobDescription] = useState("");
            const [linkedinUrl, setLinkedinUrl] = useState("");
            const [result, setResult] = useState({ optimized_cv: "", strategy: "" });

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [step, loading, error]);

            const callAi = async () => {
                if (!linkedinUrl.toLowerCase().includes("linkedin.com/")) {
                    setError("Por favor, introduce una URL de LinkedIn válida.");
                    return;
                }

                setLoading(true);
                setError(null);
                
                const prompt = `
                    Eres un experto en reclutamiento y optimización de perfiles profesionales. 
                    Tu misión es generar un CV optimizado para la siguiente vacante: "${jobDescription}". 
                    
                    CONTEXTO DEL USUARIO:
                    El perfil del usuario se encuentra en este enlace de LinkedIn: "${linkedinUrl}". 
                    
                    INSTRUCCIONES:
                    1. Utiliza tu capacidad de búsqueda para analizar la información pública de este perfil de LinkedIn (experiencia, educación, habilidades).
                    2. Genera un CV completo y optimizado que resalte las habilidades que busca la vacante de forma SUTIL y profesional.
                    3. No copies frases de la vacante; utiliza terminología técnica adecuada de forma orgánica.
                    4. Explica brevemente qué cambios estratégicos realizaste para vencer los filtros ATS.

                    Responde exclusivamente en formato JSON: {"optimized_cv": "...", "strategy": "..."}
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "google_search": {} }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.7
                            }
                        })
                    });

                    if (!response.ok) throw new Error("Error de conexión con la IA.");
                    
                    const data = await response.json();
                    let rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    // Limpieza de etiquetas de bloque de código
                    if (rawText.includes("```json")) {
                        rawText = rawText.split("```json")[1].split("```")[0];
                    } else if (rawText.includes("```")) {
                        rawText = rawText.split("```")[1].split("```")[0];
                    }
                    
                    const output = JSON.parse(rawText.trim());
                    setResult(output);
                    setStep(3);
                } catch (err) {
                    console.error("AI Error:", err);
                    setError("No pudimos procesar tu solicitud. Asegúrate de que el perfil de LinkedIn sea público e intenta de nuevo.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="w-full min-h-screen flex flex-col items-center py-8 md:py-16 px-4">
                    <div className="w-full max-w-4xl">
                        
                        {/* PASO 0: MANIFIESTO */}
                        {step === 0 && (
                            <div className="animate-slide text-center space-y-10 py-4">
                                <div className="max-w-lg mx-auto meme-card rounded-[2.5rem] p-6 shadow-xl relative mb-12 transform -rotate-1">
                                    <div className="absolute -top-4 -right-4 bg-yellow-400 text-black font-black px-4 py-1 rounded-full text-[10px] shadow-lg uppercase tracking-tight">Realidad</div>
                                    <div className="grid grid-cols-2 gap-4 text-left">
                                        <div className="space-y-2">
                                            <div className="bg-white rounded-2xl p-4 shadow-sm">
                                                <span className="text-4xl">🧑‍💻</span>
                                                <p className="text-[10px] font-bold text-slate-400 mt-2 uppercase">Yo:</p>
                                                <p className="text-[11px] font-black leading-tight text-slate-800">"Tengo 5 años de experiencia y hablo 3 idiomas."</p>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="bg-white rounded-2xl p-4 shadow-sm border-2 border-red-100">
                                                <span className="text-4xl">🤖</span>
                                                <p className="text-[10px] font-bold text-slate-400 mt-2 uppercase">El Bot:</p>
                                                <p className="text-[11px] font-black leading-tight text-red-600">"Error: No encontré la palabra clave 'Ninja'. Descartado."</p>
                                            </div>
                                        </div>
                                    </div>
                                    <p className="mt-4 text-[10px] text-indigo-400 font-bold italic text-center">POV: El ATS ignorando tu talento por falta de una keyword.</p>
                                </div>

                                <div className="inline-block p-4 bg-indigo-600 rounded-3xl text-white shadow-2xl rotate-3 mb-4">
                                    <i data-lucide="zap" className="w-8 h-8 md:w-10 md:h-10"></i>
                                </div>

                                <div className="space-y-6">
                                    <h1 className="text-4xl md:text-7xl font-[900] text-slate-900 tracking-tighter leading-none">
                                        No más <span className="text-indigo-600">ghosting</span> corporativo.
                                    </h1>
                                    <div className="max-w-2xl mx-auto px-4 space-y-4">
                                        <p className="text-lg md:text-xl text-slate-600 font-bold">¿Qué es Adulting?</p>
                                        <p className="text-base md:text-lg text-slate-500 leading-relaxed font-medium">
                                            Es un <b>copiloto inteligente</b> diseñado para ayudarte a modificar tu CV y vencer los filtros de IA (ATS). Analizamos los requisitos de la vacante y adaptamos tu experiencia de forma sutil para que tu talento deje de ser invisible para los algoritmos.
                                        </p>
                                    </div>
                                </div>

                                <button onClick={() => setStep(1)} className="group relative px-10 py-5 bg-slate-900 text-white rounded-2xl font-black text-lg transition-all hover:bg-indigo-600 hover:scale-105 active:scale-95 shadow-2xl shadow-indigo-200 flex items-center gap-3 mx-auto">
                                    Optimizar mi futuro <i data-lucide="arrow-right" className="group-hover:translate-x-1 transition-transform"></i>
                                </button>
                            </div>
                        )}

                        {step > 0 && (
                            <div className="animate-slide">
                                <header className="flex items-center justify-between mb-8 px-2">
                                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setStep(0)}>
                                        <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white shadow-lg shadow-indigo-100"><i data-lucide="zap" className="w-4 h-4"></i></div>
                                        <span className="font-black text-xl tracking-tight">adulting.</span>
                                    </div>
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] bg-white px-4 py-1.5 rounded-full border border-slate-100 shadow-sm">Bypass ATS v2.5</div>
                                </header>

                                <div className="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl shadow-indigo-100/30">
                                    <div className="flex border-b border-slate-100 bg-slate-50/50">
                                        {[1, 2, 3].map(s => (
                                            <div key={s} className={`flex-1 py-4 text-center text-[10px] font-black uppercase tracking-widest transition-all ${step === s ? 'text-indigo-600 border-b-2 border-indigo-600 bg-white' : 'text-slate-300'}`}>0{s}</div>
                                        ))}
                                    </div>

                                    <div className="p-6 md:p-14">
                                        {step === 1 && (
                                            <div className="space-y-8 text-left">
                                                <div className="space-y-2">
                                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">La Oportunidad</h2>
                                                    <p className="text-sm text-slate-400 font-medium tracking-tight">Pega la descripción del puesto aquí.</p>
                                                </div>
                                                <textarea className="w-full h-48 md:h-64 p-6 rounded-3xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 outline-none transition-all resize-none text-slate-700 text-sm leading-relaxed" placeholder="Ej: Buscamos un analista con experiencia en SQL..." value={jobDescription} onChange={(e) => setJobDescription(e.target.value)} />
                                                <button onClick={() => setStep(2)} disabled={!jobDescription} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-indigo-600 disabled:opacity-30 transition-all text-lg shadow-xl shadow-slate-200">Siguiente Paso <i data-lucide="chevron-right"></i></button>
                                            </div>
                                        )}

                                        {step === 2 && (
                                            <div className="space-y-8 text-left">
                                                <div className="space-y-2">
                                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">Tu Perfil</h2>
                                                    <p className="text-sm text-slate-400 font-medium tracking-tight">Pega el enlace a tu perfil de LinkedIn.</p>
                                                </div>
                                                
                                                <div className="relative">
                                                    <div className="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none text-slate-400">
                                                        <i data-lucide="linkedin" className="w-5 h-5"></i>
                                                    </div>
                                                    <input 
                                                        type="url"
                                                        className="w-full py-6 pl-14 pr-6 rounded-3xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 outline-none transition-all text-slate-700 text-sm font-medium shadow-inner"
                                                        placeholder="https://www.linkedin.com/in/tu-perfil/"
                                                        value={linkedinUrl}
                                                        onChange={(e) => setLinkedinUrl(e.target.value)}
                                                    />
                                                </div>

                                                <div className="p-6 bg-amber-50 rounded-2xl border border-amber-100">
                                                    <p className="text-[11px] text-amber-700 leading-relaxed font-medium">
                                                        <b>Nota importante:</b> Para mejores resultados, asegúrate de que tu perfil tenga activada la visibilidad pública. La IA buscará tu información laboral para redactar el CV.
                                                    </p>
                                                </div>

                                                {error && <p className="text-red-500 text-[11px] font-black bg-red-50 p-4 rounded-2xl border border-red-100 flex items-center gap-2 animate-slide"><i data-lucide="alert-circle" className="w-4 h-4"></i> {error}</p>}
                                                
                                                <div className="flex flex-col md:flex-row gap-4 pt-4">
                                                    <button onClick={() => setStep(1)} className="order-2 md:order-1 flex-1 py-4 text-slate-400 font-bold hover:text-slate-600 transition-colors uppercase text-xs tracking-widest">Volver</button>
                                                    <button onClick={callAi} disabled={loading || !linkedinUrl} className="order-1 md:order-2 flex-[2] py-5 bg-indigo-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-900 shadow-xl shadow-indigo-100 transition-all text-lg">
                                                        {loading ? <><div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Analizando...</> : <><i data-lucide="sparkles"></i> Generar con LinkedIn</>}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {step === 3 && (
                                            <div className="space-y-8 animate-slide text-left">
                                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center border border-green-100 shadow-sm"><i data-lucide="shield-check" className="w-6 h-6"></i></div>
                                                        <div><h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">CV Optimizado</h2><p className="text-xs text-slate-400 font-bold uppercase mt-1 tracking-tighter">Sincronizado con tu perfil</p></div>
                                                    </div>
                                                    <div className="flex gap-2 w-full md:w-auto">
                                                        <button onClick={() => {
                                                            const el = document.createElement('textarea');
                                                            el.value = result.optimized_cv;
                                                            document.body.appendChild(el);
                                                            el.select();
                                                            document.execCommand('copy');
                                                            document.body.removeChild(el);
                                                        }} className="flex-1 md:flex-none p-5 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-all text-slate-600 shadow-sm"><i data-lucide="copy"></i></button>
                                                        <button onClick={() => { const el = document.createElement("a"); el.href = URL.createObjectURL(new Blob([result.optimized_cv], {type: 'text/plain'})); el.download = "CV_Adulting_LinkedIn.txt"; el.click(); }} className="flex-[3] md:flex-none py-4 px-8 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl hover:bg-indigo-600 transition-all shadow-indigo-100"><i data-lucide="download"></i> Descargar</button>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                                    <div className="lg:col-span-2 bg-slate-900 rounded-[2rem] p-6 md:p-10 text-slate-300 font-mono text-[11px] md:text-[13px] h-80 md:h-[550px] overflow-y-auto leading-loose border border-slate-800 preview-scroll shadow-inner relative">
                                                        {result.optimized_cv}
                                                    </div>
                                                    <div className="space-y-6">
                                                        <div className="p-6 bg-indigo-50 border border-indigo-100 rounded-[2rem] shadow-sm"><h4 className="text-[10px] font-black text-indigo-800 uppercase tracking-widest mb-3 flex items-center gap-2 leading-none"><i data-lucide="cpu" className="w-3 h-3"></i> Estrategia IA</h4><p className="text-xs text-indigo-700 leading-relaxed font-semibold italic">"{result.strategy}"</p></div>
                                                        <div className="p-6 bg-white border border-slate-100 rounded-[2rem] shadow-sm"><p className="text-[10px] text-slate-400 font-bold leading-relaxed">TIP: Copia este texto y úsalo para actualizar tu currículum en formato Word o PDF.</p></div>
                                                        <button onClick={() => {setStep(0); setLinkedinUrl("");}} className="w-full py-4 text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-indigo-600 transition-colors">Nueva Versión</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <footer className="max-w-4xl mx-auto mt-12 text-center text-slate-300 text-[10px] font-black uppercase tracking-[0.3em] px-4 pb-12">Adulting • IA Analytics • 2024</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
